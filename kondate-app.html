<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランダム献立 | 献立アプリ</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .meal-visual {
      height: 200px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #f8f3ed;
      transition: background 0.4s;
      position: relative; overflow: hidden;
    }
    .meal-visual__circle1 {
      position: absolute; width: 220px; height: 220px; border-radius: 50%;
      background: #ece4d8; opacity: 0.2; top: -70px; right: -70px; transition: background 0.4s;
    }
    .meal-visual__circle2 {
      position: absolute; width: 140px; height: 140px; border-radius: 50%;
      background: #ece4d8; opacity: 0.15; bottom: -40px; left: -40px; transition: background 0.4s;
    }
    .meal-visual__content { text-align: center; z-index: 1; }
    .meal-visual__emoji { font-size: 64px; line-height: 1; margin-bottom: 8px; transition: filter 0.08s; }
    .meal-visual__name { font-size: clamp(17px,5vw,22px); font-weight: 800; color: #2d1f14; margin-bottom: 4px; transition: filter 0.08s; }
    .meal-visual__desc { font-size: 12px; color: #8b7d72; transition: filter 0.08s; }
    .meal-visual__empty { text-align: center; z-index: 1; }
    .meal-visual__empty-icon { font-size: 52px; opacity: 0.3; margin-bottom: 8px; }
    .meal-visual__empty-text { font-size: 13px; color: #c4a882; font-weight: 600; }
    .meal-visual__badge {
      display: inline-block; margin-top: 10px;
      font-size: 11px; font-weight: 700; padding: 3px 14px;
      border-radius: 20px; letter-spacing: 1.5px; color: #fff;
      animation: popIn 0.3s ease 0.1s both;
    }
    .card-body { padding: 18px 20px 20px; }
    .btn-row { display: flex; gap: 10px; margin-top: 10px; animation: fadeIn 0.3s ease; }
    .btn--outline {
      flex: 1; padding: 12px; border-radius: 12px;
      border: 2px solid; background: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn--green { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #06C755; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(6,199,85,0.25); }
    .btn--green:hover { filter: brightness(1.1); transform: translateY(-1px); }
    /* Recipe panel */
    .recipe-panel { width: min(380px, 96vw); background: #fff; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 16px; animation: slideUp 0.35s ease; }
    .recipe-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .recipe-header__label { font-size: 13px; font-weight: 700; }
    .servings-btns { display: flex; gap: 8px; }
    .srv-btn {
      width: 30px; height: 30px; border-radius: 8px; border: 2px solid #e0d8d0;
      background: #fff; color: #7a6a5a; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .srv-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .ingredients-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; padding: 0 20px 14px; }
    .ing-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #faf7f4; border-radius: 10px; gap: 6px; }
    .ing-name { font-size: 12px; color: #4a3428; font-weight: 600; flex: 1; }
    .ing-amount { font-size: 12px; font-weight: 700; white-space: nowrap; }
    .steps-list { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
    .step-item { display: flex; gap: 12px; align-items: flex-start; }
    .step-num {
      min-width: 24px; height: 24px; border-radius: 50%;
      font-size: 12px; font-weight: 800; color: #fff;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-text { font-size: 13px; color: #3a2a1a; line-height: 1.6; padding-top: 2px; }
    /* History */
    .history { width: min(380px, 96vw); }
    .history__label { font-size: 10px; letter-spacing: 4px; color: #c4a882; margin-bottom: 10px; text-align: center; font-weight: 700; }
    .history__list { display: flex; flex-direction: column; gap: 7px; }
    .history__item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: rgba(255,255,255,0.85); border-radius: 14px; border-left: 3px solid; }
    .history__emoji { font-size: 20px; }
    .history__name { font-size: 13px; font-weight: 700; color: #3d2a1c; }
    .history__cat { font-size: 10px; font-weight: 700; margin-left: auto; padding: 2px 8px; border-radius: 10px; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a class="site-nav__logo" href="index.html">🍽️ 献立アプリ</a>
    <div class="site-nav__links">
      <a class="site-nav__link" href="index.html">ホーム</a>
      <a class="site-nav__link" href="kondate-app.html">ランダム</a>
      <a class="site-nav__link" href="weekly.html">週間献立</a>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-title">
      <div class="page-title__sub">✦ TONIGHT'S DINNER ✦</div>
      <h1 class="page-title__main">今夜の献立</h1>
      <div class="page-title__desc" id="total-count"></div>
    </div>

    <!-- Main card -->
    <div class="card" style="margin-bottom:16px">
      <div class="meal-visual" id="visual">
        <div class="meal-visual__circle1" id="circle1"></div>
        <div class="meal-visual__circle2" id="circle2"></div>
        <div class="meal-visual__empty" id="empty-state">
          <div class="meal-visual__empty-icon">🍽️</div>
          <div class="meal-visual__empty-text">ボタンを押して決めよう</div>
        </div>
        <div class="meal-visual__content" id="meal-content" style="display:none">
          <div class="meal-visual__emoji" id="meal-emoji"></div>
          <div class="meal-visual__name" id="meal-name"></div>
          <div class="meal-visual__desc" id="meal-desc"></div>
          <div class="meal-visual__badge" id="meal-badge"></div>
        </div>
      </div>
      <div class="card-body">
        <button class="btn btn--primary" id="spin-btn" onclick="spin()">🎲  ランダムで決める</button>
        <div class="btn-row" id="action-row" style="display:none">
          <button class="btn--outline" id="recipe-btn" onclick="toggleRecipe()">📋 材料・作り方</button>
          <button class="btn--green" onclick="Utils.shareToLine()">📤 LINEでシェア</button>
        </div>
      </div>
    </div>

    <!-- Recipe panel -->
    <div class="recipe-panel" id="recipe-panel" style="display:none">
      <div class="recipe-header" id="recipe-header">
        <div class="recipe-header__label">🛒 材料</div>
        <div class="servings-btns" id="servings-btns"></div>
      </div>
      <div class="ingredients-grid" id="ingredients-grid"></div>
      <div style="padding: 0 20px 4px; font-size:14px; font-weight:800; color:#2d1f14;">👨‍🍳 作り方</div>
      <div class="steps-list" id="steps-list"></div>
    </div>

    <!-- History -->
    <div class="history" id="history-section" style="display:none">
      <div class="history__label">HISTORY</div>
      <div class="history__list" id="history-list"></div>
    </div>

    <div class="footer" id="footer"></div>
  </div>

  <script src="script.js"></script>
  <script>
    Utils.setNavActive();
    document.getElementById('total-count').textContent = `${window.MEALS.length}種類からランダム決定`;
    document.getElementById('footer').textContent = `${window.MEALS.length} recipes · Tap to discover`;

    let currentMeal = null;
    let currentServings = 2;
    let spinning = false;
    let showRecipe = false;
    let history = [];

    function spin() {
      if (spinning) return;
      showRecipe = false;
      document.getElementById('recipe-panel').style.display = 'none';
      document.getElementById('action-row').style.display = 'none';
      spinning = true;

      const btn = document.getElementById('spin-btn');
      btn.disabled = true;
      btn.textContent = '🎲  考え中...';

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('meal-content').style.display = 'block';

      let count = 0;
      const total = 14;
      const interval = setInterval(() => {
        const m = Utils.randomMeal();
        renderMealVisual(m, true);
        count++;
        if (count >= total) {
          clearInterval(interval);
          const final = Utils.randomMeal();
          currentMeal = final;
          currentServings = final.servings;
          renderMealVisual(final, false);
          history = [final, ...history].slice(0, 4);
          renderHistory();
          spinning = false;
          btn.disabled = false;
          btn.textContent = '🎲  ランダムで決める';
          document.getElementById('action-row').style.display = 'flex';
          updateRecipeBtn();
        }
      }, 70 + count * 7);
    }

    function renderMealVisual(m, blur) {
      const c = Utils.catColors[m.category];
      document.getElementById('visual').style.background = c.bg;
      document.getElementById('circle1').style.background = c.border;
      document.getElementById('circle2').style.background = c.border;
      const f = blur ? 'blur(3px)' : 'none';
      document.getElementById('meal-emoji').textContent = m.emoji;
      document.getElementById('meal-emoji').style.filter = f;
      document.getElementById('meal-name').textContent = m.name;
      document.getElementById('meal-name').style.filter = f;
      document.getElementById('meal-desc').textContent = m.desc;
      document.getElementById('meal-desc').style.filter = f;
      const badge = document.getElementById('meal-badge');
      badge.textContent = m.category;
      badge.style.background = c.accent;
      badge.style.display = blur ? 'none' : 'inline-block';
    }

    function toggleRecipe() {
      showRecipe = !showRecipe;
      if (showRecipe) renderRecipe();
      document.getElementById('recipe-panel').style.display = showRecipe ? 'block' : 'none';
      updateRecipeBtn();
    }

    function updateRecipeBtn() {
      const btn = document.getElementById('recipe-btn');
      const c = Utils.catColors[currentMeal.category];
      btn.style.borderColor = c.accent;
      btn.style.color = c.accent;
      btn.style.background = showRecipe ? c.bg : '#fff';
      btn.textContent = showRecipe ? '▲ 閉じる' : '📋 材料・作り方';
    }

    function renderRecipe() {
      const m = currentMeal;
      const c = Utils.catColors[m.category];
      const ratio = currentServings / m.servings;

      // header
      const header = document.getElementById('recipe-header');
      header.style.background = c.bg;
      header.style.borderBottom = `2px solid ${c.border}`;

      // servings buttons
      const btns = document.getElementById('servings-btns');
      btns.innerHTML = '';
      for (let n = 1; n <= 6; n++) {
        const b = document.createElement('button');
        b.className = 'srv-btn' + (n === currentServings ? ' active' : '');
        b.style.setProperty('--accent', c.accent);
        if (n === currentServings) { b.style.background = c.accent; b.style.color = '#fff'; b.style.borderColor = c.accent; }
        b.textContent = n;
        b.onclick = () => { currentServings = n; renderRecipe(); };
        btns.appendChild(b);
      }

      // ingredients
      const grid = document.getElementById('ingredients-grid');
      grid.innerHTML = m.ingredients.map(ing => `
        <div class="ing-item">
          <span class="ing-name">${ing.name}</span>
          <span class="ing-amount" style="color:${c.accent}">
            ${ing.unit === '適量' ? '適量' : Utils.formatAmount(ing.amount, ratio) + ing.unit}
          </span>
        </div>
      `).join('');

      // servings badge on header label
      document.querySelector('.recipe-header__label').innerHTML =
        `🛒 材料 <span style="font-size:11px;font-weight:600;color:${c.accent};background:${c.bg};padding:2px 8px;border-radius:10px;margin-left:6px">${currentServings}人前</span>`;

      // steps
      const steps = document.getElementById('steps-list');
      steps.innerHTML = m.steps.map((s, i) => `
        <div class="step-item">
          <div class="step-num" style="background:${c.accent}">${i+1}</div>
          <div class="step-text">${s}</div>
        </div>
      `).join('');
    }

    function renderHistory() {
      if (history.length <= 1) return;
      document.getElementById('history-section').style.display = 'block';
      const list = document.getElementById('history-list');
      list.innerHTML = history.slice(1).map((m, i) => {
        const c = Utils.catColors[m.category];
        return `<div class="history__item" style="border-left-color:${c.accent};opacity:${1 - i * 0.22}">
          <span class="history__emoji">${m.emoji}</span>
          <span class="history__name">${m.name}</span>
          <span class="history__cat" style="color:${c.accent};background:${c.bg}">${m.category}</span>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
