<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>献立アプリ</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      padding: 32px 16px 64px;
      text-align: center;
    }
    .hero__emoji { font-size: 72px; margin-bottom: 16px; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .hero__title { font-size: clamp(28px,8vw,48px); font-weight: 800; color: #2d1f14; letter-spacing: -1px; margin-bottom: 8px; }
    .hero__sub { font-size: 14px; color: #b8a08a; margin-bottom: 48px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: min(380px, 94vw); }
    .menu-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      padding: 24px 16px 20px;
      text-decoration: none;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .menu-card:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(0,0,0,0.12); }
    .menu-card__emoji { font-size: 40px; }
    .menu-card__title { font-size: 15px; font-weight: 800; color: #2d1f14; }
    .menu-card__desc { font-size: 11px; color: #b8a08a; text-align: center; line-height: 1.5; }
    .menu-card--random { border-color: #c4733a; }
    .menu-card--weekly { border-color: #3a7a3a; }
    .share-row { margin-top: 36px; }
    .share-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 28px; border-radius: 14px; border: none;
      background: #06C755; color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(6,199,85,0.25);
      letter-spacing: 1px;
    }
    .share-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .stats { margin-top: 32px; font-size: 12px; color: #c4a882; letter-spacing: 1px; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a class="site-nav__logo" href="index.html">🍽️ 献立アプリ</a>
    <div class="site-nav__links">
      <a class="site-nav__link" href="index.html">ホーム</a>
      <a class="site-nav__link" href="kondate-app.html">ランダム</a>
      <a class="site-nav__link" href="weekly.html">週間献立</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero__emoji">🍽️</div>
    <h1 class="hero__title">今夜の献立</h1>
    <p class="hero__sub" id="subtext">読み込み中...</p>

    <div class="menu-grid">
      <a class="menu-card menu-card--random" href="kondate-app.html">
        <div class="menu-card__emoji">🎲</div>
        <div class="menu-card__title">ランダム献立</div>
        <div class="menu-card__desc">今夜の夕食を<br>ボタン1つで決定</div>
      </a>
      <a class="menu-card menu-card--weekly" href="weekly.html">
        <div class="menu-card__emoji">📅</div>
        <div class="menu-card__title">週間献立</div>
        <div class="menu-card__desc">月〜日の献立を<br>まとめて計画</div>
      </a>
    </div>

    <div class="share-row">
      <button class="share-btn" onclick="Utils.shareToLine()">
        📤 このアプリをLINEでシェア
      </button>
    </div>

    <p class="stats" id="stats"></p>
  </div>

  <script src="script.js"></script>
  <script>
    Utils.setNavActive();
    const total = window.MEALS.length;
    const cats = [...new Set(window.MEALS.map(m => m.category))];
    document.getElementById('subtext').textContent = `${total}種類の献立データ収録`;
    document.getElementById('stats').textContent =
      cats.map(c => `${c} ${window.MEALS.filter(m=>m.category===c).length}種`).join(' · ');
  </script>
</body>
</html>
